name: Collect Nesoriel Pulse

on:
  schedule:
    - cron: '17 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-pulse
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Collect Pulse data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect-pulse.mjs
      - name: Commit Pulse update
        run: |
          if git diff --quiet -- src/data/pulse; then
            echo "Pulse data is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/pulse
          git commit -m "chore(pulse): update daily project pulse"
          git push
