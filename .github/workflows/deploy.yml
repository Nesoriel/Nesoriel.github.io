name: Deploy GitHub Pages and sync CNB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CNB_REPOSITORY: https://cnb.cool/Nesoriel/nesoriel.cn.git

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build:github
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-cnb:
    name: Sync to CNB
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "$CNB_TOKEN" ]; then
            echo "CNB_TOKEN secret is required to sync to CNB." >&2
            exit 1
          fi
          git config user.name "cnb"
          git config user.email "cnb@users.noreply.github.com"
          git remote add cnb "$CNB_REPOSITORY"
          BASIC_AUTH="$(printf 'cnb:%s' "$CNB_TOKEN" | base64 -w 0)"
          git -c http.extraheader="Authorization: Basic ${BASIC_AUTH}" push cnb HEAD:main
